<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download | Astra Client</title>
    <link rel="icon" href="icon.jpg">
    <link rel="stylesheet" href="download.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js" crossorigin="anonymous"></script>
</head>
<body>

    <header>
        <h2 class="logo">Astra Client</h2>
        <nav class="navigation">
            <a href="index.html">Home</a>
            <a href="credits.html">Credits</a>
            <a href="updates.html">Updates</a>
            <a href="Shop.html">Store</a>
            
            <button class="btn-nav-download" onclick="window.location.href='download.html'">Download</button>
        </nav>
    </header>

    <main class="download-container">
        <section class="download-card">
            <span class="badge upcoming">Upcoming Release</span>
            <h1 class="download-title">Astra v2.0</h1>
            <p class="download-subtitle">We are currently finalizing the build. Astra Client will be available for download in:</p>

            <div class="countdown-wrapper">
                <div class="time-box">
                    <span id="days">00</span>
                    <p>Days</p>
                </div>
                <div class="time-box">
                    <span id="hours">00</span>
                    <p>Hours</p>
                </div>
                <div class="time-box">
                    <span id="minutes">00</span>
                    <p>Mins</p>
                </div>
                <div class="time-box">
                    <span id="seconds">00</span>
                    <p>Secs</p>
                </div>
            </div>

            <p class="release-date-text"><i class="far fa-calendar-alt"></i> 22 FEB | 12:00 UTC</p>

            <div class="cta-container">
                <a href="https://discord.com/events/1458805775609892888/1474429822116696094" class="btn-notify">Notify Me on Discord</a>
            </div>
        </section>
    </main>

    <script>
        // Updated to 2026 based on our project timeline
        const countDownDate = new Date("Feb 22, 2026 12:00:00 UTC").getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerHTML = days.toString().padStart(2, '0');
            document.getElementById("hours").innerHTML = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerHTML = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerHTML = seconds.toString().padStart(2, '0');

            if (distance < 0) {
                clearInterval(x);
                document.querySelector(".download-card").innerHTML = "<h1>Released! Refresh page.</h1>";
            }
        }, 1000);
    </script>
</body>
</html>
